<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
/* ===== RESET ===== */
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* ===== BACKGROUND ===== */
.background {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 1;
}

.wave {
    position: absolute;
    width: 160%;
    height: 160%;
    top: -30%;
    left: -30%;
    border-radius: 50%;
    filter: blur(12px);
}

.wave.one {
    background: radial-gradient(#ff9ad5, #ff2f92, #c40063);
    animation: move1 22s ease-in-out infinite;
}
.wave.two {
    background: radial-gradient(#ff6fb5, #ff2f92, #9c004d);
    animation: move2 28s ease-in-out infinite;
    mix-blend-mode: screen;
}
.wave.three {
    background: radial-gradient(#ffc1e8, #ff4fa3, #6a0035);
    animation: move3 34s ease-in-out infinite;
    opacity: 0.85;
}

@keyframes move1 { 50% { transform: translate(-6%, -4%) rotate(3deg); } }
@keyframes move2 { 50% { transform: translate(5%, -7%) rotate(-4deg); } }
@keyframes move3 { 50% { transform: translate(-4%, 6%) rotate(2deg); } }

/* ===== BALLOONS ===== */
#balloons {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
}

.balloon {
    position: absolute;
    bottom: -150px;
    width: 70px;
    height: 90px;
    background: radial-gradient(circle at top, #ff9aa2, #e60026);
    border-radius: 50%;
    animation: rise linear forwards;
}
.balloon::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    width: 2px;
    height: 45px;
    background: rgba(255,255,255,0.9);
    transform: translateX(-50%);
}
@keyframes rise {
    to { transform: translateY(-180vh) scale(1.3); }
}

/* ===== PAGE SECTIONS ===== */
.page {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
}

/* Page 1 */
#page1 {
    opacity: 1;
    transition: opacity 1.5s ease;
}

/* Page 2 */
#page2 {
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
}

/* Text */
h1 {
    color: white;
    font-size: 48px;
    text-align: center;
}
p {
    color: white;
    font-size: 22px;
    line-height: 1.7;
    text-align: center;
}

/* Button */
.start-btn {
    padding: 22px 65px;
    font-size: 26px;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    background: #ff2f92;
    color: white;
    box-shadow: 0 0 45px rgba(255,47,146,0.9);
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="background">
    <div class="wave one"></div>
    <div class="wave two"></div>
    <div class="wave three"></div>
</div>

<!-- BALLOONS -->
<div id="balloons"></div>

<!-- PAGE 1 -->
<div id="page1" class="page">
    <button class="start-btn" onclick="startTransition()">Start</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <div>
       <h1>For You ❤️</h1>
        <p>
            I hope you’ll wait for me.
            Just like this beautiful website I made, I’ll make your life more beautiful.<br>
            I’ll create even more amazing things, build a good career, and become someone you can be proud of. <br>
            Please wait for me—I promise I’ll come for you
        </p>
    </div>
</div>

<script>
let spawn;

function startTransition() {

    // Start balloons
    const layer = document.getElementById("balloons");
    spawn = setInterval(() => {
        for (let i = 0; i < 40; i++) {
            const b = document.createElement("div");
            b.className = "balloon";
            b.style.left = Math.random() * 100 + "vw";
            b.style.animationDuration =
                (Math.random() * 1.2 + 2.5) + "s";
            layer.appendChild(b);
        }
    }, 70);

    // Fade out page 1
    setTimeout(() => {
        document.getElementById("page1").style.opacity = "0";
    }, 600);

    // Fade in page 2 WHILE balloons are still moving
    setTimeout(() => {
        const p2 = document.getElementById("page2");
        p2.style.opacity = "1";
        p2.style.pointerEvents = "auto";
    }, 900);

    // Optional: stop spawning balloons later
    setTimeout(() => {
        clearInterval(spawn);
    }, 2500);
}
</script>

</body>
</html>
