<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* ===== PAGE FADE IN ===== */
body {
    opacity: 0;
    animation: pageIn 1.4s ease forwards;
}
@keyframes pageIn { to { opacity: 1; } }

/* ===== BACKGROUND ===== */
.background {
    position: fixed;
    inset: 0;
}
.wave {
    position: absolute;
    width: 160%;
    height: 160%;
    top: -30%;
    left: -30%;
    border-radius: 50%;
    filter: blur(12px);
}
.wave.one {
    background: radial-gradient(#ff9ad5, #ff2f92, #c40063);
    animation: move1 22s ease-in-out infinite;
}
.wave.two {
    background: radial-gradient(#ff6fb5, #ff2f92, #9c004d);
    animation: move2 28s ease-in-out infinite;
    mix-blend-mode: screen;
}
.wave.three {
    background: radial-gradient(#ffc1e8, #ff4fa3, #6a0035);
    animation: move3 34s ease-in-out infinite;
    opacity: 0.85;
}
@keyframes move1 { 50% { transform: translate(-6%, -4%) rotate(3deg); } }
@keyframes move2 { 50% { transform: translate(5%, -7%) rotate(-4deg); } }
@keyframes move3 { 50% { transform: translate(-4%, 6%) rotate(2deg); } }

/* ===== BALLOONS CONTINUE ===== */
#balloons {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
}

/* ===== TEXT ===== */
.content {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    z-index: 5;
}
.text {
    max-width: 800px;
    animation: textIn 2s ease forwards;
}
@keyframes textIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
h1 { font-size: 48px; }
p { font-size: 22px; line-height: 1.7; }
</style>
</head>

<body>

<div class="background">
    <div class="wave one"></div>
    <div class="wave two"></div>
    <div class="wave three"></div>
</div>

<div id="balloons"></div>

<div class="content">
    <div class="text">
        <h1>For You ❤️</h1>
        <p>
            This moment didn’t end.<br>
            It just became something more.
        </p>
    </div>
</div>

<script>
// Continue balloons briefly if coming from page 1
if (sessionStorage.getItem("fromPage1")) {
    sessionStorage.removeItem("fromPage1");

    const layer = document.getElementById("balloons");

    let spawn = setInterval(() => {
        for (let i = 0; i < 25; i++) {
            const b = document.createElement("div");
            b.className = "balloon";
            b.style.left = Math.random() * 100 + "vw";
            b.style.animationDuration =
                (Math.random() * 1.2 + 2.5) + "s";
            layer.appendChild(b);
        }
    }, 80);

    // Stop balloons smoothly
    setTimeout(() => {
        clearInterval(spawn);
    }, 1800);
}
</script>

</body>
</html>
